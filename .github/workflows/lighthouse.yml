name: Lighthouse

# Heavier performance + accessibility gate. Unlike the fast `frontend` job in
# ci.yml (lint · types · unit · build, no server), this workflow boots a real
# `next start` server and runs Lighthouse CI against live pages to enforce the
# performance budget and Core Web Vitals thresholds in lighthouserc.json.
#
# Kept in a separate workflow so the cheap checks in ci.yml stay fast and this
# slower browser-driven gate can be gated/parallelised independently.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so a fast follow-up push doesn't
# queue behind a stale run.
concurrency:
  group: lighthouse-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse (performance · a11y · CWV)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `npm ci` installs from the committed package-lock.json for a
      # reproducible tree. The postinstall chrome-launcher patch runs here too.
      - name: Install dependencies
        run: npm ci

      # Production build required before `next start`. `npm run build` maps to
      # `next build`; reuses the npm ci tree installed above.
      - name: Build
        run: npm run build

      # `npm run test:a11y:lighthouse` maps to `lhci autorun`, which boots the
      # production server via `startServerCommand: npm run start` (per
      # lighthouserc.json), runs Lighthouse against the configured URLs, and
      # asserts the performance/accessibility/CWV budgets.
      - name: Lighthouse CI
        run: npm run test:a11y:lighthouse
