<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Philotimo — Checkout</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    html, body, #root { margin: 0; padding: 0; min-height: 100%; }
    body {
      font-family: "Inter", "SF Pro Display", -apple-system, system-ui, sans-serif;
      font-feature-settings: "ss01";
      background: #ffffff;
      color: #0d253d;
      -webkit-font-smoothing: antialiased;
    }
    * { box-sizing: border-box; }
    a { color: inherit; }
    button { font-family: inherit; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="checkout.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "campaignId": "pcrf",
      "state": "default",
      "currency": "EUR",
      "showNote": true,
      "coverFees": false,
      "layout": "split"
    }/*EDITMODE-END*/;

    const CURRENCY_GLYPH = { EUR: "€", USD: "$", GBP: "£" };

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      return (
        <React.Fragment>
          <CheckoutPage
            campaignId={t.campaignId}
            state={t.state}
            currency={CURRENCY_GLYPH[t.currency] || "€"}
            showNote={t.showNote}
            coverFees={t.coverFees}
            layout={t.layout}
          />
          <TweaksPanel title="Tweaks">
            <TweakSection title="State">
              <TweakRadio
                label="Page state"
                value={t.state}
                options={[
                  { value: 'default',    label: 'Default' },
                  { value: 'processing', label: 'Processing' },
                ]}
                onChange={(v) => setTweak('state', v)}
              />
            </TweakSection>
            <TweakSection title="Campaign">
              <TweakRadio
                label="Cause"
                value={t.campaignId}
                options={[
                  { value: 'pcrf', label: "PCRF" },
                  { value: 'wck',  label: 'WCK' },
                ]}
                onChange={(v) => setTweak('campaignId', v)}
              />
            </TweakSection>
            <TweakSection title="Money">
              <TweakRadio
                label="Currency"
                value={t.currency}
                options={[
                  { value: 'EUR', label: '€ EUR' },
                  { value: 'USD', label: '$ USD' },
                  { value: 'GBP', label: '£ GBP' },
                ]}
                onChange={(v) => setTweak('currency', v)}
              />
              <TweakToggle
                label="Donor covers fees"
                value={t.coverFees}
                onChange={(v) => setTweak('coverFees', v)}
              />
            </TweakSection>
            <TweakSection title="Form">
              <TweakToggle
                label="Show note field"
                value={t.showNote}
                onChange={(v) => setTweak('showNote', v)}
              />
              <TweakRadio
                label="Layout"
                value={t.layout}
                options={[
                  { value: 'split',    label: 'Split' },
                  { value: 'centered', label: 'Centered' },
                ]}
                onChange={(v) => setTweak('layout', v)}
              />
            </TweakSection>
          </TweaksPanel>
        </React.Fragment>
      );
    }

    function boot() {
      if (typeof CheckoutPage === 'undefined' || typeof TweaksPanel === 'undefined') {
        setTimeout(boot, 30);
        return;
      }
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    }
    boot();
  </script>
</body>
</html>
