<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Eudaimonia — Receipt Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    html, body, #root { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: "Inter", -apple-system, system-ui, sans-serif;
      font-feature-settings: "ss01";
      background: #f0eee9;
      -webkit-font-smoothing: antialiased;
    }
    * { box-sizing: border-box; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="receipt.jsx"></script>
  <script type="text/babel" src="receipt-mobile.jsx"></script>
  <script type="text/babel" src="receipt-states.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "trackerStyle": "card",
      "accent": "indigo",
      "showFeeStrip": true,
      "wordmarkStyle": "phi-circle"
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      return (
        <React.Fragment>
          <DesignCanvas>
            <DCSection id="primary" title="Eudaimonia · Receipt" subtitle="eudaimonia.app/receipt/0xdc67…78ed — desktop + mobile + share image">
              <DCArtboard id="desktop" label="Desktop · 1440" width={1440} height={2080}>
                <EudaimoniaReceipt trackerStyle={t.trackerStyle} showFeeStrip={t.showFeeStrip} />
              </DCArtboard>
              <DCArtboard id="mobile" label="Mobile · 390" width={390} height={2200}>
                <EudaimoniaReceiptMobile />
              </DCArtboard>
              <DCArtboard id="og" label="Open Graph · 1200×630" width={1200} height={630}>
                <EudaimoniaOG />
              </DCArtboard>
            </DCSection>

            <DCSection id="states" title="States" subtitle="Empty + skeleton — when the URL has no valid tx, or while the chain is loading">
              <DCArtboard id="invalid" label="Invalid TxID · /receipt/0xnothing" width={1440} height={860}>
                <EudaimoniaInvalid />
              </DCArtboard>
              <DCArtboard id="loading" label="Loading · skeleton" width={1440} height={1100}>
                <EudaimoniaLoading />
              </DCArtboard>
            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection title="Receipt">
              <TweakRadio
                label="Tracker layout"
                value={t.trackerStyle}
                options={[
                  { value: 'card', label: 'Cards' },
                  { value: 'minimal', label: 'Minimal' },
                ]}
                onChange={(v) => setTweak('trackerStyle', v)}
              />
              <TweakToggle
                label="Fee disclosure strip"
                value={t.showFeeStrip}
                onChange={(v) => setTweak('showFeeStrip', v)}
              />
            </TweakSection>
          </TweaksPanel>
        </React.Fragment>
      );
    }

    // Wait until all babel scripts have finished compiling + exporting.
    function boot() {
      if (typeof EudaimoniaReceipt === 'undefined'
          || typeof EudaimoniaReceiptMobile === 'undefined'
          || typeof EudaimoniaOG === 'undefined'
          || typeof EudaimoniaInvalid === 'undefined'
          || typeof EudaimoniaLoading === 'undefined'
          || typeof DesignCanvas === 'undefined'
          || typeof TweaksPanel === 'undefined') {
        setTimeout(boot, 30);
        return;
      }
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    }
    boot();
  </script>
</body>
</html>
