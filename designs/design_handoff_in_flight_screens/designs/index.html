<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eudaimonia · Missing Screens</title>
  <link rel="stylesheet" href="colors_and_type.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    /* Reset any default heading margins inside artboards so the design's
       own spacing tokens drive layout, not browser defaults. */
    h1, h2, h3, h4, h5, h6, p { margin: 0; }
    a { color: inherit; }
    button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="atoms.jsx"></script>
  <script type="text/babel" src="tracker-live.jsx"></script>
  <script type="text/babel" src="screen-processing.jsx"></script>
  <script type="text/babel" src="screen-failure.jsx"></script>
  <script type="text/babel" src="screen-resume.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "processing_stage": 4,
      "failure_outcome": "onchain_revert",
      "resume_status": "failed"
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      const processingStages = buildLiveStages({ currentStage: t.processing_stage });

      return (
        <React.Fragment>
          <TrackerStyles />

          <DesignCanvas
            title="Eudaimonia · Missing MVP Screens"
            subtitle={"Live processing · Failure · Session resume   ·   Desktop & mobile, one canonical version each.\nUse the Tweaks panel to scrub the live tracker stage and flip failure / resume states."}
          >
            <DCSection
              id="processing"
              title="01 — Live processing"
              subtitle="Donor returns from the Stripe-hosted onramp. The 5-stage tracker is the centerpiece — done / active / queued / failed states wire 1:1 to the Stripe webhook events from epic-3."
            >
              <DCArtboard id="processing-desktop" label={`Desktop · 1440 · Stage ${t.processing_stage}/5`} width={1440} height={1240}>
                <ProcessingScreen stages={processingStages} currentStage={t.processing_stage} isDesktop={true} />
              </DCArtboard>
              <DCArtboard id="processing-mobile" label={`Mobile · 390 · Stage ${t.processing_stage}/5`} width={390} height={1760}>
                <ProcessingScreen stages={processingStages} currentStage={t.processing_stage} isDesktop={false} />
              </DCArtboard>
            </DCSection>

            <DCSection
              id="failure"
              title="02 — Failure / interrupted"
              subtitle="Reassuring + diagnostic. Always tells the donor where the money is right now. Four outcomes map to the four real failure modes from the onramp + router."
            >
              <DCArtboard id="failure-desktop" label={`Desktop · 1440 · ${t.failure_outcome.replace("_"," ")}`} width={1440} height={1260}>
                <FailureScreen outcome={t.failure_outcome} isDesktop={true} />
              </DCArtboard>
              <DCArtboard id="failure-mobile" label={`Mobile · 390 · ${t.failure_outcome.replace("_"," ")}`} width={390} height={1900}>
                <FailureScreen outcome={t.failure_outcome} isDesktop={false} />
              </DCArtboard>
            </DCSection>

            <DCSection
              id="resume"
              title="03 — Session resume"
              subtitle="Landed here from the email 'check status' link. Calm status check — promotes the receipt page when settled, refunds when failed."
            >
              <DCArtboard id="resume-desktop" label={`Desktop · 1440 · ${t.resume_status}`} width={1440} height={1180}>
                <ResumeScreen status={t.resume_status} isDesktop={true} />
              </DCArtboard>
              <DCArtboard id="resume-mobile" label={`Mobile · 390 · ${t.resume_status}`} width={390} height={1680}>
                <ResumeScreen status={t.resume_status} isDesktop={false} />
              </DCArtboard>
            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Live processing">
              <TweakRadio
                label="Tracker stage"
                value={t.processing_stage}
                onChange={(v) => setTweak('processing_stage', v)}
                options={[
                  { value: 1, label: '1' },
                  { value: 2, label: '2' },
                  { value: 3, label: '3' },
                  { value: 4, label: '4' },
                  { value: 5, label: '5' },
                ]}
              />
            </TweakSection>

            <TweakSection label="Failure outcome">
              <TweakSelect
                label="Failure mode"
                value={t.failure_outcome}
                onChange={(v) => setTweak('failure_outcome', v)}
                options={[
                  { value: 'card_declined',    label: 'Card declined (step 1)' },
                  { value: 'kyc_failed',       label: 'KYC failed (step 2)' },
                  { value: 'onchain_revert',   label: 'On-chain revert (step 3)' },
                  { value: 'network_timeout',  label: 'Network timeout (step 2)' },
                ]}
              />
            </TweakSection>

            <TweakSection label="Session resume status">
              <TweakRadio
                label="Status"
                value={t.resume_status}
                onChange={(v) => setTweak('resume_status', v)}
                options={[
                  { value: 'settling', label: 'Settling' },
                  { value: 'settled',  label: 'Settled' },
                  { value: 'failed',   label: 'Failed' },
                ]}
              />
            </TweakSection>
          </TweaksPanel>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
