<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Eudaimonia — Give once. See exactly where it goes.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    html, body, #root { margin: 0; padding: 0; min-height: 100%; }
    body {
      font-family: "Inter", "SF Pro Display", -apple-system, system-ui, sans-serif;
      font-feature-settings: "ss01";
      background: #ffffff;
      color: #0d253d;
      -webkit-font-smoothing: antialiased;
    }
    * { box-sizing: border-box; }
    a { color: inherit; }
    button { font-family: inherit; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="landing.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "heroCopy": "statement",
      "campaignLayout": "image-top",
      "showLiveStrip": true,
      "showCreamBand": true
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      return (
        <React.Fragment>
          <EudaimoniaLanding
            heroCopy={t.heroCopy}
            campaignLayout={t.campaignLayout}
            showLiveStrip={t.showLiveStrip}
            showCreamBand={t.showCreamBand}
          />
          <TweaksPanel title="Tweaks">
            <TweakSection title="Hero">
              <TweakRadio
                label="Headline voice"
                value={t.heroCopy}
                options={[
                  { value: 'statement', label: 'Statement' },
                  { value: 'question', label: 'Question' },
                ]}
                onChange={(v) => setTweak('heroCopy', v)}
              />
              <TweakToggle
                label="Live receipts strip"
                value={t.showLiveStrip}
                onChange={(v) => setTweak('showLiveStrip', v)}
              />
            </TweakSection>
            <TweakSection title="Causes">
              <TweakRadio
                label="Card layout"
                value={t.campaignLayout}
                options={[
                  { value: 'image-top', label: 'Image top' },
                  { value: 'image-side', label: 'Image side' },
                ]}
                onChange={(v) => setTweak('campaignLayout', v)}
              />
            </TweakSection>
            <TweakSection title="Rhythm">
              <TweakToggle
                label="Cream interlude band"
                value={t.showCreamBand}
                onChange={(v) => setTweak('showCreamBand', v)}
              />
            </TweakSection>
          </TweaksPanel>
        </React.Fragment>
      );
    }

    function boot() {
      if (typeof EudaimoniaLanding === 'undefined' || typeof TweaksPanel === 'undefined') {
        setTimeout(boot, 30);
        return;
      }
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    }
    boot();
  </script>
</body>
</html>
